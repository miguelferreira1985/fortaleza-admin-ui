<section class="login-section">
  <div class="login-container">

    <!-- Card del Logo -->
    <mat-card class="login-logo-card">
      <img
        src="assets/images/FortalezaLogoBlanco.jpeg"
        alt="La Fortaleza Logo"
        class="logo-image"
      />
    </mat-card>

    <!-- Card del Formulario -->
    <mat-card class="login-form-card">
      <mat-card-header>
        <mat-card-title>Iniciar sesión</mat-card-title>
      </mat-card-header>

      <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

          <!-- Campo Usuario -->
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Usuario</mat-label>
            <input
              matInput
              formControlName="username"
              autocomplete="username"
            />
            <mat-icon matPrefix>person_outline</mat-icon>
            @if (usernameControl?.hasError('required') && usernameControl?.touched) {
              <mat-error>El usuario es requerido</mat-error>
            }
          </mat-form-field>

          <!-- Campo Contraseña -->
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Contraseña</mat-label>
            <input
              matInput
              formControlName="password"
              [type]="hidePassword ? 'password' : 'text'"
              autocomplete="current-password"
            />
            <mat-icon matPrefix>lock_outline</mat-icon>
            <button
              mat-icon-button
              matSuffix
              type="button"
              (click)="hidePassword = !hidePassword"
              [matTooltip]="hidePassword ? 'Mostrar' : 'Ocultar'"
            >
              <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            @if (passwordControl?.hasError('required') && passwordControl?.touched) {
              <mat-error>La contraseña es requerida</mat-error>
            }
          </mat-form-field>

        </form>
      </mat-card-content>

      <mat-card-actions>
        <button
          mat-flat-button
          color="primary"
          class="full-width submit-btn"
          [disabled]="isLoading"
          (click)="onSubmit()"
        >
          @if (isLoading) {
            <mat-spinner diameter="20" class="spinner-inline" />
            <span>Ingresando...</span>
          } @else {
            <span>Ingresar</span>
          }
        </button>
      </mat-card-actions>

    </mat-card>

  </div>
</section>
