<!-- ===== HEADER ===== -->
<div class="page-header">
  <h1>Gestión de Presentaciones</h1>
</div>

<!-- ===== TARJETA PRINCIPAL ===== -->
<div class="content-card">

  <!-- TOOLBAR: Búsqueda + Botón Agregar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <h2>Lista de Presentaciones</h2>
    </div>

    <div class="toolbar-right">
      <!-- Campo de búsqueda -->
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Buscar presentación</mat-label>
        <input
          matInput
          [(ngModel)]="searchTerm"
          (ngModelChange)="applyFilter()"
          placeholder="Nombre o abreviación...">
        <mat-icon matPrefix>search</mat-icon>
      </mat-form-field>

      <!-- Botón agregar -->
      <button
        mat-raised-button
        color="primary"
        (click)="openCreateDialog()"
        class="add-button">
        <mat-icon>add_circle</mat-icon>
        Agregar Presentación
      </button>
    </div>
  </div>

  <!-- ===== TABLA ===== -->
  <div class="table-container">

    <!-- Loader mientras carga -->
    <div *ngIf="isLoading" class="loading-spinner">
      <mat-spinner></mat-spinner>
    </div>

    <!-- Tabla con datos -->
    <table
      mat-table
      [dataSource]="dataSource"
      matSort
      class="presentations-table"
      *ngIf="!isLoading && dataSource">

      <!-- COLUMNA: Nombre -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>
          Nombre
        </th>
        <td mat-cell *matCellDef="let presentation">
          {{ presentation.name | uppercase }}
        </td>
      </ng-container>

      <!-- COLUMNA: Abreviación -->
      <ng-container matColumnDef="abbreviation">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>
          Abreviación
        </th>
        <td mat-cell *matCellDef="let presentation">
          {{ presentation.abbreviation | uppercase }}
        </td>
      </ng-container>

      <!-- COLUMNA: Acciones -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="actions-column">
          Acciones
        </th>
        <td mat-cell *matCellDef="let presentation" class="actions-cell">
          <!-- Botón Editar -->
          <button
            mat-icon-button
            color="accent"
            (click)="openEditDialog(presentation)"
            matTooltip="Editar presentación">
            <mat-icon>edit</mat-icon>
          </button>

          <!-- Botón Eliminar -->
          <button
            mat-icon-button
            color="warn"
            (click)="deletePresentation(presentation)"
            matTooltip="Eliminar presentación">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <!-- Definición de filas -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns;"
        class="table-row"></tr>

      <!-- Mensaje cuando no hay datos -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">
          <div class="no-data-message">
            <mat-icon>info</mat-icon>
            <p>{{ searchTerm ? 'No se encontraron resultados' : 'No hay presentaciones registradas' }}</p>
          </div>
        </td>
      </tr>

    </table>

    <!-- Paginador -->
    <mat-paginator
      *ngIf="!isLoading && dataSource"
      [pageSizeOptions]="[5, 10, 25, 50]"
      [pageSize]="10"
      showFirstLastButtons>
    </mat-paginator>

  </div>

</div>
